name: IonClaw

options:
  bundleIdPrefix: com.ionclaw
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "16.0"
    tvOS: "16.0"
    watchOS: "9.0"

settings:
  base:
    PRODUCT_NAME: IonClaw
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 99AHAA343Q
    SWIFT_INCLUDE_PATHS: "$(SRCROOT)/Shared/CIonClaw"
    GENERATE_INFOPLIST_FILE: NO

# the project is defined here and generated by xcodegen, the .xcodeproj is not checked in
fileGroups:
  - project.yml

# shared build steps applied to every app target
targetTemplates:
  AppTarget:
    type: application
    sources:
      - path: Shared/Sources
      - path: Shared/Resources/Assets.xcassets
    dependencies:
      - framework: ../../build/xcframework/ionclaw.xcframework
        embed: true
        codeSign: true

targets:
  IonClaw-iOS:
    templates:
      - AppTarget
    platform: iOS
    sources:
      - path: iOS/Sources
      - path: iOS/Resources/Assets.xcassets
      - path: iOS/Resources/LaunchScreen.storyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ionclaw.app
        INFOPLIST_FILE: iOS/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  IonClaw-tvOS:
    templates:
      - AppTarget
    platform: tvOS
    sources:
      - path: tvOS/Sources
      - path: tvOS/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ionclaw.app.tvos
        INFOPLIST_FILE: tvOS/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "3"
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"

  IonClaw-watchOS:
    templates:
      - AppTarget
    platform: watchOS
    sources:
      - path: watchOS/Sources
      - path: watchOS/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ionclaw.app.watchos
        INFOPLIST_FILE: watchOS/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
